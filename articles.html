<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AyurWell Knowledge Hub</title>

  <link rel="stylesheet" href="articles.css">
  <script src="articles.js" defer></script>

</head>

<body>

  <div class="header">

    <div class="bookmark-section">
    <button id="bookmarkBtn">
        ★ Bookmarks
    </button>

    <div id="bookmarkDropdown" class="hidden">
    </div>
</div>
    <h1>🌿 AyurWell Knowledge Hub</h1>

    <p>
      Explore trusted Ayurvedic articles, remedies and wellness resources.
    </p>

  </div>

  <div class="controls">

    <select id="categoryFilter">

      <option value="all">All Topics</option>

      <option value="Acne">Acne</option>
      <option value="Stress">Stress</option>
      <option value="Digestion">Digestion</option>
      <option value="Sleep">Sleep</option>
      <option value="Hair Fall">Hair Fall</option>

    </select>

    <input
      type="text"
      id="searchInput"
      placeholder="Search symptoms, diseases, remedies..."
    >

    <button id="searchBtn">
      Search
    </button>

  </div>

  <div class="articles-container" id="articlesContainer">

  </div>

</body>
</html>
